name: Build and Deploy Resumes to Cloudflare R2

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'resume-*.json'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Chromium dependencies
        run: |
         sudo apt-get update
         sudo apt-get install -y chromium-browser
        env:
          PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: false

      - name: Install JSON Resume CLI and Theme
        run: npm install resumed jsonresume-theme-elegant

      - name: Generate PDFs
        run: |
          # Using npx resumed is often more reliable in CI/CD
          npx resumed export resume-ux.json -o ux-resume.pdf --theme jsonresume-theme-elegant
          npx resumed export resume-pm.json -o pm-resume.pdf --theme jsonresume-theme-elegant
          npx resumed export resume-bsa.json -o bsa-resume.pdf --theme jsonresume-theme-elegant

      - name: Upload PDFs to Cloudflare R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-east-1 # Explicit region prevents exit code 255
        run: |
          aws s3 cp ux-resume.pdf s3://resume-as-code/ux-resume.pdf --endpoint-url https://${{ secrets.CLOUDFLARE_ACCOUNT_ID }}.r2.cloudflarestorage.com
          aws s3 cp pm-resume.pdf s3://resume-as-code/pm-resume.pdf --endpoint-url https://${{ secrets.CLOUDFLARE_ACCOUNT_ID }}.r2.cloudflarestorage.com
          aws s3 cp bsa-resume.pdf s3://resume-as-code/bsa-resume.pdf --endpoint-url https://${{ secrets.CLOUDFLARE_ACCOUNT_ID }}.r2.cloudflarestorage.com
