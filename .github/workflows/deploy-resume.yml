name: Build and Deploy Resumes to Cloudflare R2

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'resume-*.json'   # only trigger when a JSON file actually changes

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Chromium
        run: sudo apt-get install -y chromium-browser

      - name: Install resume-cli and theme
        run: npm install -g resume-cli jsonresume-theme-even
        env:
          PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: "true"

      - name: Export PDFs
        run: |
          resume export corbet-pm.pdf     --resume resume-pm.json  --theme even
          resume export corbet-ux.pdf     --resume resume-ux.json  --theme even
          resume export corbet-bsa.pdf    --resume resume-bsa.json --theme even
        env:
          PUPPETEER_EXECUTABLE_PATH: /usr/bin/chromium-browser

      - name: Upload to Cloudflare R2
        run: |
          aws s3 cp corbet-pm.pdf  s3://${{ secrets.R2_BUCKET_NAME }}/corbet-pm.pdf  --endpoint-url ${{ secrets.R2_ENDPOINT }}
          aws s3 cp corbet-ux.pdf  s3://${{ secrets.R2_BUCKET_NAME }}/corbet-ux.pdf  --endpoint-url ${{ secrets.R2_ENDPOINT }}
          aws s3 cp corbet-bsa.pdf s3://${{ secrets.R2_BUCKET_NAME }}/corbet-bsa.pdf --endpoint-url ${{ secrets.R2_ENDPOINT }}
        env:
          AWS_ACCESS_KEY_ID:     ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION:    auto